<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1500" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1533" />
      <stop offset="0.45" stop-color="#0A1A45" />
      <stop offset="1" stop-color="#092538" />
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(430 260) rotate(34) scale(380 260)">
      <stop stop-color="#6A7DFF" stop-opacity="0.35" />
      <stop offset="1" stop-color="#6A7DFF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1210 730) rotate(-21) scale(430 300)">
      <stop stop-color="#36D8AC" stop-opacity="0.32" />
      <stop offset="1" stop-color="#36D8AC" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F1C42" stop-opacity="0.95" />
      <stop offset="1" stop-color="#0C1634" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="nodeA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5F73FF" stop-opacity="0.45" />
      <stop offset="1" stop-color="#2A3A7E" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="nodeB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#39DBB0" stop-opacity="0.45" />
      <stop offset="1" stop-color="#1A6458" stop-opacity="0.25" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" filterUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="10" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#2C3E6B" fill-opacity="0.4" />
    </pattern>
  </defs>

  <rect width="1600" height="1000" rx="28" fill="url(#bg)" />
  <rect width="1600" height="1000" rx="28" fill="url(#glowA)" />
  <rect width="1600" height="1000" rx="28" fill="url(#glowB)" />

  <rect x="140" y="120" width="1320" height="760" rx="28" fill="url(#panel)" stroke="#2D3E6A" stroke-width="2" />
  <rect x="190" y="170" width="1220" height="660" rx="24" fill="#08132E" stroke="#324674" stroke-width="1.5" />
  <rect x="190" y="170" width="1220" height="660" rx="24" fill="url(#grid)" />

  <g filter="url(#soft)">
    <rect x="250" y="250" width="320" height="250" rx="30" fill="#111E45" stroke="#4C6197" stroke-width="2" />
    <rect x="290" y="320" width="240" height="130" rx="26" fill="url(#nodeA)" stroke="#5469A8" />

    <rect x="640" y="460" width="360" height="240" rx="30" fill="#111E45" stroke="#4C6197" stroke-width="2" />
    <rect x="690" y="530" width="260" height="130" rx="26" fill="url(#nodeB)" stroke="#3D7E78" />

    <rect x="1060" y="210" width="290" height="250" rx="30" fill="#111E45" stroke="#4C6197" stroke-width="2" />
    <rect x="1110" y="290" width="190" height="130" rx="26" fill="url(#nodeB)" stroke="#3D7E78" />
  </g>

  <path d="M530 390C640 390 650 575 780 575" stroke="#8FA6E8" stroke-width="3" stroke-linecap="round" opacity="0.75" />
  <path d="M950 575C1060 575 1080 380 1205 355" stroke="#8FA6E8" stroke-width="3" stroke-linecap="round" opacity="0.75" />

  <text x="278" y="290" fill="#AFC2EE" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">input.image</text>
  <text x="688" y="495" fill="#AFC2EE" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">pipeline.scene_generation</text>
  <text x="1090" y="280" fill="#AFC2EE" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">out.open_in_viewer</text>

  <g opacity="0.5">
    <circle cx="1240" cy="700" r="6" fill="#4C64A7" />
    <circle cx="1284" cy="742" r="4" fill="#4C64A7" />
    <circle cx="1210" cy="760" r="3" fill="#4C64A7" />
  </g>
